<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SALENCE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="wrapper">

    <div class="clock-container">

        <!-- Numbers -->

        <div class="number n1">1</div>
        <div class="number n2">2</div>
        <div class="number n3">3</div>
        <div class="number n4">4</div>
        <div class="number n5">5</div>
        <div class="number n6">6</div>
        <div class="number n7">7</div>
        <div class="number n8">8</div>
        <div class="number n9">9</div>
        <div class="number n10">10</div>
        <div class="number n11">11</div>
        <div class="number n12">12</div>

        <!-- Gears -->

        <div class="gear gear-top">
            <div class="web"></div>
        </div>

        <div class="gear gear-left">
            <div class="web"></div>
        </div>

        <div class="gear gear-right">
            <div class="web"></div>
        </div>

        <div class="gear gear-bottom">
            <div class="web"></div>
        </div>

        <!-- Spider -->

        <div class="spider">

            <div class="body"></div>

            <div class="leg leg-hour"></div>

            <div class="leg leg-minute"></div>

        </div>

        <!-- Second Hand -->

        <div class="second-hand" id="secondHand"></div>

    </div>

    <!-- Code Panel -->

    <div class="terminal">

        <div class="terminal-header">

            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>

        </div>

<pre id="codePanel">

const creator = "SALENCE";

function startClock(){
    return true;
}

clock.online = true;

</pre>

    </div>

</div>

<footer>

    SALENCE

</footer>

<script src="js/script.js"></script>

</body>
</html>
